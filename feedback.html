<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Post-Quiz Check-In</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{background:#f7fbff;color:#333;}
  nav{position:fixed;top:0;width:100%;padding:15px 24px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(14px);background:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.4);z-index:1000;}
  nav .logo{font-size:1.2rem;font-weight:600;color:#0b5ed7;}
  nav .pill{background:#0b5ed7;color:#fff;border-radius:20px;padding:8px 12px;font-size:0.8rem;}
  .container{max-width:820px;margin:auto;padding:110px 20px 40px;text-align:center;}
  h1{color:#0b5ed7;margin-bottom:14px;}
  p{margin-bottom:16px;}
  .scale-note{background:#f1f8ff;border-left:4px solid #0b5ed7;padding:12px;text-align:left;margin-bottom:20px;}
  .question{background:#fff;padding:22px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.08);margin-bottom:16px;text-align:left;}
  .question h3{margin-bottom:10px;}
  label{display:block;margin-bottom:8px;cursor:pointer;}
  .submit-btn{display:block;margin:24px auto;padding:14px 32px;border-radius:30px;border:none;background:#28a745;color:#fff;font-size:1rem;cursor:pointer;}
</style>
</head>
<body>
<nav>
  <div class="logo">CalmLearn | Check-In</div>
  <div class="pill" id="roundPill">Round 1 of 2</div>
</nav>

<div class="container">
  <h1>Post-Quiz Check-In</h1>
  <p>Use the same rating logic as before.</p>
  <div class="scale-note">Scale: 1 = very low, 2 = low, 3 = neutral, 4 = high, 5 = very high.</div>

  <form id="feedbackForm">
    <div class="question">
      <h3>How stressed do you feel now?</h3>
      <label><input type="radio" name="postStress" value="1"> 1</label>
      <label><input type="radio" name="postStress" value="2"> 2</label>
      <label><input type="radio" name="postStress" value="3"> 3</label>
      <label><input type="radio" name="postStress" value="4"> 4</label>
      <label><input type="radio" name="postStress" value="5"> 5</label>
    </div>

    <div class="question">
      <h3>How confident are you about photosynthesis now?</h3>
      <label><input type="radio" name="postConfidence" value="1"> 1</label>
      <label><input type="radio" name="postConfidence" value="2"> 2</label>
      <label><input type="radio" name="postConfidence" value="3"> 3</label>
      <label><input type="radio" name="postConfidence" value="4"> 4</label>
      <label><input type="radio" name="postConfidence" value="5"> 5</label>
    </div>

    <button type="button" class="submit-btn" onclick="submitFeedback()">Continue</button>
  </form>
</div>

<script>
const method = localStorage.getItem("currentMethod") || "textbook";
const order = JSON.parse(localStorage.getItem("methodOrder") || "[\"textbook\",\"calmlearn\"]");
const currentIndex = Number(localStorage.getItem("currentMethodIndex") || "0");
document.getElementById("roundPill").textContent = `Round ${currentIndex + 1} of ${order.length}`;

function submitFeedback(){
  const stress = document.querySelector('input[name="postStress"]:checked');
  const confidence = document.querySelector('input[name="postConfidence"]:checked');
  if(!stress){ alert("Please select your stress level."); return; }
  if(!confidence){ alert("Please select your confidence level."); return; }

  localStorage.setItem(`${method}PostStress`, stress.value);
  localStorage.setItem(`${method}PostConfidence`, confidence.value);

  const nextIndex = currentIndex + 1;
  if (nextIndex < order.length) {
    const nextMethod = order[nextIndex];
    localStorage.setItem("currentMethodIndex", String(nextIndex));
    localStorage.setItem("currentMethod", nextMethod);
    window.location.href = nextMethod === "textbook" ? "textbook.html" : "calm.html";
    return;
  }

  window.location.href = "completion.html";
}
</script>

</body>
</html>
