<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Post-Quiz Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{background:#f7fbff;color:#333;}
  nav{position:fixed;top:0;width:100%;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(14px);background:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.4);z-index:1000;}
  nav .logo{font-size:1.4rem;font-weight:600;color:#0b5ed7;}
  nav ul{display:flex;gap:25px;list-style:none;align-items:center;}
  nav ul li a{text-decoration:none;color:#333;font-size:0.95rem;}
  nav ul li a:hover{color:#0b5ed7;}
  nav button{background:#000;color:#fff;border:none;padding:10px 18px;border-radius:25px;cursor:pointer;font-size:0.85rem;}
  #accessibilityPanel{position:fixed;top:80px;right:30px;width:240px;background:#fff;border-radius:18px;box-shadow:0 15px 30px rgba(0,0,0,0.2);padding:20px;display:none;z-index:1001;}
  #accessibilityPanel h4{margin-bottom:15px;}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
  .toggle-row input{transform:scale(1.3);cursor:pointer;}
  #fontSlider{width:100%;cursor:pointer;}
  .container{max-width:800px;margin:auto;padding:140px 20px 60px;text-align:center;}
  h1{color:#0b5ed7;margin-bottom:20px;}
  .question{background:#fff;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.08);margin-bottom:25px;text-align:left;}
  .question h3{margin-bottom:15px;}
  label{display:block;margin-bottom:8px;cursor:pointer;}
  .submit-btn{display:block;margin:40px auto;padding:16px 45px;border-radius:30px;border:none;background:#28a745;color:#fff;font-size:1.1rem;cursor:pointer;}
</style>
</head>
<body>

<nav>
  <div class="logo">🌿 CalmLearn</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="experiment.html">Experiment</a></li>
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="results.html">Results</a></li>
  </ul>
  <button id="accessBtn">♿ Accessibility</button>
</nav>

<div id="accessibilityPanel">
  <h4>Accessibility</h4>
  <div class="toggle-row">
    <label for="accessToggle">Enable</label>
    <input type="checkbox" id="accessToggle">
  </div>
  <label for="fontSlider">Text Size</label>
  <input type="range" id="fontSlider" min="14" max="22" value="16">
</div>

<div class="container">
  <h1>Almost there!</h1>
  <p>Please tell us how you feel after completing the quiz.</p>

  <form id="feedbackForm">
    <div class="question">
      <h3>How stressed do you feel now?</h3>
      <label><input type="radio" name="postStress" value="1">1</label>
      <label><input type="radio" name="postStress" value="2">2</label>
      <label><input type="radio" name="postStress" value="3">3</label>
      <label><input type="radio" name="postStress" value="4">4</label>
      <label><input type="radio" name="postStress" value="5">5</label>
    </div>

    <div class="question">
      <h3>How confident are you with the material after the quiz?</h3>
      <label><input type="radio" name="postConfidence" value="1">1</label>
      <label><input type="radio" name="postConfidence" value="2">2</label>
      <label><input type="radio" name="postConfidence" value="3">3</label>
      <label><input type="radio" name="postConfidence" value="4">4</label>
      <label><input type="radio" name="postConfidence" value="5">5</label>
    </div>

    <button type="button" class="submit-btn" onclick="submitFeedback()">See Results</button>
  </form>
</div>

<script>
const accessBtn = document.getElementById("accessBtn");
const panel = document.getElementById("accessibilityPanel");
const toggle = document.getElementById("accessToggle");
const slider = document.getElementById("fontSlider");

accessBtn.onclick = () => {
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

toggle.onchange = () => {
  document.body.classList.toggle("accessible", toggle.checked);
  localStorage.setItem("accessible", toggle.checked);
};

slider.oninput = () => {
  document.documentElement.style.setProperty("--base-font-size", slider.value + "px");
  localStorage.setItem("fontSize", slider.value);
};

window.onload = () => {
  if (localStorage.getItem("accessible") === "true") {
    document.body.classList.add("accessible");
    toggle.checked = true;
  }
  const savedFont = localStorage.getItem("fontSize");
  if (savedFont) {
    document.documentElement.style.setProperty("--base-font-size", savedFont + "px");
    slider.value = savedFont;
  }
};

function submitFeedback(){
  const stress = document.querySelector('input[name="postStress"]:checked');
  const confidence = document.querySelector('input[name="postConfidence"]:checked');
  if(!stress){ alert("Please select your stress level."); return; }
  if(!confidence){ alert("Please select your confidence level."); return; }
  const method = localStorage.getItem("selectedMethod") || localStorage.getItem("learningMethod");
  if(method === "textbook"){
    localStorage.setItem("textbookPostStress", stress.value);
    localStorage.setItem("textbookPostConfidence", confidence.value);
  } else {
    localStorage.setItem("calmPostStress", stress.value);
    localStorage.setItem("calmPostConfidence", confidence.value);
  }
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
