<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmLearn | Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #f7fbff; color: #333; }
    nav {
      position: fixed; top: 0; width: 100%; padding: 15px 24px;
      backdrop-filter: blur(12px); background: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      display: flex; justify-content: space-between; align-items: center; z-index: 1000;
    }
    nav h2 { color: #0b5ed7; font-size: 1.1rem; }
    .timer { color: #c30000; font-weight: 600; }
    .container { max-width: 850px; margin: auto; padding: 110px 20px 40px; }
    h1 { text-align: center; margin-bottom: 12px; color: #0b5ed7; }
    .meta { text-align: center; margin-bottom: 22px; color: #435; }
    .question {
      background: #fff; padding: 22px; border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .question h3 { margin-bottom: 12px; font-size: 1.02rem; }
    label { display: block; margin-bottom: 8px; cursor: pointer; }
    .submit-btn {
      display: block; margin: 30px auto; padding: 14px 32px;
      border-radius: 30px; border: none; background: #28a745;
      color: #fff; font-size: 1rem; cursor: pointer;
    }
    .audio-btn {
      border: none;
      border-radius: 18px;
      padding: 8px 14px;
      cursor: pointer;
      background: #28a745;
      color: #fff;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<nav>
  <h2 id="quizNavTitle">Topic Quiz</h2>
  <div class="timer">Time Left: <span id="time">05:00</span></div>
</nav>

<div class="container">
  <h1>Knowledge Check</h1>
  <p class="meta" id="metaText"></p>
  <form id="quizForm"></form>
  <button type="button" class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
</div>

<script src="curriculum.js"></script>
<script src="audio-reader.js"></script>
<script>
  const method = localStorage.getItem("currentMethod") || "textbook";
  const methodIndex = Number(localStorage.getItem("currentMethodIndex") || "0");
  const round = methodIndex + 1;
  document.getElementById("metaText").textContent = `Round ${round} of 2 | Method: ${method}`;
  const selection = window.CalmLearnCurriculum.getActiveSelection();
  const topic = selection.topic;
  if (topic) document.getElementById("quizNavTitle").textContent = topic.quizTitle;
  const fallbackQuestions = [
    { prompt: "What helps learners understand a topic better?", options: ["Clear explanations and practice", "Skipping lessons", "Ignoring feedback"], answer: "a" },
    { prompt: "Why is reviewing key ideas useful?", options: ["It improves retention", "It reduces understanding", "It replaces learning"], answer: "a" },
    { prompt: "What is a good study habit?", options: ["Read, practice, and self-check", "Memorize without meaning", "Avoid questions"], answer: "a" },
    { prompt: "What should you do when unsure?", options: ["Re-read and use examples", "Guess and move on always", "Skip the topic"], answer: "a" },
    { prompt: "Why are quizzes used in learning?", options: ["To check understanding", "To remove topics", "To replace lessons"], answer: "a" },
    { prompt: "What supports confidence in learning?", options: ["Small consistent progress", "No practice", "Random reading"], answer: "a" },
    { prompt: "Why should answers be evidence-based?", options: ["It improves accuracy", "It makes answers shorter only", "It avoids meaning"], answer: "a" },
    { prompt: "What is the value of feedback?", options: ["It helps improve performance", "It ends learning", "It removes reflection"], answer: "a" },
    { prompt: "What does applying knowledge mean?", options: ["Using ideas in tasks", "Only reading titles", "Avoiding examples"], answer: "a" },
    { prompt: "What is the best next step after learning?", options: ["Practice and reflect", "Stop immediately", "Ignore results"], answer: "a" }
  ];

  const letters = ["a", "b", "c", "d"];
  const sourceQuestions = (topic?.questions && topic.questions.length) ? topic.questions : fallbackQuestions;
  const questionBank = sourceQuestions.map((item, i) => ({
    id: `q${i + 1}`,
    correctText: item.options[letters.indexOf(item.answer)] || item.options[0],
    variants: [{ prompt: item.prompt, options: item.options }]
  }));

  function hashString(value) {
    let hash = 0;
    for (let i = 0; i < value.length; i++) {
      hash = ((hash << 5) - hash) + value.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  function seededRandom(seed) {
    let value = seed % 2147483647;
    if (value <= 0) value += 2147483646;
    return function () {
      value = value * 16807 % 2147483647;
      return (value - 1) / 2147483646;
    };
  }

  function shuffle(arr, randomFn = Math.random) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(randomFn() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function ensureFourOptions(options, correctText, qid) {
    const unique = [];
    options.forEach((option) => {
      if (option && !unique.includes(option)) unique.push(option);
    });

    const extras = [
      "None of the above",
      "All of the above",
      "It depends on the question",
      "A different idea"
    ];

    let extraIndex = 0;
    while (unique.length < 4) {
      const candidate = extras[(hashString([qid, unique.length, extraIndex].join("|")) + extraIndex) % extras.length];
      extraIndex += 1;
      if (candidate !== correctText && !unique.includes(candidate)) unique.push(candidate);
    }

    return unique.slice(0, 4);
  }

  const shuffleSeed = hashString([method, methodIndex, topic?.id || "general"].join("|"));
  const seeded = seededRandom(shuffleSeed || 1);
  const renderedQuestions = shuffle(questionBank, seeded).map((q, idx) => {
    const version = q.variants[methodIndex % q.variants.length] || q.variants[0];
    const optionSeed = seededRandom(hashString([method, methodIndex, q.id, "options"].join("|")) || 1);
    const fourOptions = ensureFourOptions(version.options, q.correctText, q.id);
    const options = shuffle(fourOptions.map((label) => ({ label })), optionSeed).map((option, i) => ({
      value: letters[i],
      label: option.label
    }));
    const answer = options.find((option) => option.label === q.correctText)?.value || "a";
    return { ...q, index: idx + 1, prompt: version.prompt, answer, options };
  });

  const quizForm = document.getElementById("quizForm");
  renderedQuestions.forEach((q) => {
    const box = document.createElement("div");
    box.className = "question";

    const title = document.createElement("h3");
    title.textContent = `${q.index}. ${q.prompt}`;
    box.appendChild(title);

    q.options.forEach((opt) => {
      const label = document.createElement("label");
      label.innerHTML = `<input type="radio" name="${q.id}" value="${opt.value}"> ${opt.label}`;
      box.appendChild(label);
    });

    quizForm.appendChild(box);
  });
  window.CalmLearnAudioReader.mountControls(["#quizNavTitle", "h1", ".meta", ".question h3", ".question label"], ".container");

  let time = 300;
  const timerEl = document.getElementById("time");
  const quizStart = Date.now();
  let submitted = false;

  const countdown = setInterval(() => {
    const minutes = Math.floor(time / 60);
    const seconds = time % 60;
    timerEl.textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

    if (time <= 0) {
      clearInterval(countdown);
      submitQuiz();
    }
    time--;
  }, 1000);

  function submitQuiz(){
    if (submitted) return;
    submitted = true;
    clearInterval(countdown);

    let score = 0;
    renderedQuestions.forEach((q) => {
      const selected = document.querySelector(`input[name="${q.id}"]:checked`);
      if (selected && selected.value === q.answer) score++;
    });

    const quizSeconds = Math.floor((Date.now() - quizStart) / 1000);

    localStorage.setItem(`${method}Score`, String(score));
    localStorage.setItem(`${method}QuizTime`, String(quizSeconds));
    localStorage.setItem(`${method}QuizTotal`, String(renderedQuestions.length));

    window.location.href = "feedback.html";
  }
</script>

</body>
</html>
