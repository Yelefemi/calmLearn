<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Poppins,sans-serif;}
body{margin:0;background:linear-gradient(135deg,#eaf6ff,#f7fbff);padding:24px;color:#234;}
.container{max-width:1440px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:16px;}
h1{color:#0b5ed7;margin:0;}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 10px 24px rgba(0,0,0,0.08);margin-bottom:20px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
button{border:none;border-radius:22px;padding:10px 16px;background:#0b5ed7;color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;}
button.secondary{background:#5b6e85;}
button.ghost{background:#edf5ff;color:#0b5ed7;border:1px solid #cfe0ff;}
button.active{background:#28a745;}
button:hover{opacity:0.92;}
button:disabled{opacity:0.6;cursor:not-allowed;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.metric{background:#f5faff;border:1px solid #d7e9ff;border-radius:10px;padding:16px;text-align:center;}
.metric .label{font-size:0.8rem;color:#567;margin-bottom:8px;}
.metric .value{font-weight:700;color:#0b5ed7;font-size:1.35rem;}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filters input,.filters select{padding:8px 12px;border:1px solid #c7d8ef;border-radius:8px;font-size:0.9rem;flex:1;min-width:150px;background:#fff;}
.search-input{width:100%;max-width:300px;}
.table-container{overflow-x:auto;max-height:65vh;overflow-y:auto;border:1px solid #d7e9ff;border-radius:10px;}
table{border-collapse:collapse;width:100%;background:#fff;min-width:1150px;}
th,td{border-bottom:1px solid #edf4ff;padding:12px;text-align:left;font-size:0.88rem;vertical-align:top;}
th{position:sticky;top:0;background:#edf5ff;color:#123;font-weight:600;z-index:10;}
tr:hover{background:#f9fcff;}
.score-high{color:#28a745;font-weight:700;}
.score-med{color:#b38600;font-weight:700;}
.score-low{color:#dc3545;font-weight:700;}
.tab-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
#status{font-size:0.95rem;min-height:20px;margin-bottom:12px;}
.status-loading{color:#0b5ed7;}
.status-error{color:#c30000;}
.status-success{color:#28a745;}
.note{font-size:0.92rem;color:#567;line-height:1.6;}
.login-card{max-width:520px;margin:10vh auto 0;}
.login-field{display:block;width:100%;margin:10px 0 14px;padding:12px 14px;border:1px solid #c7d8ef;border-radius:10px;font-size:1rem;}
.login-help{color:#567;font-size:0.92rem;line-height:1.6;margin:0 0 14px;}
.password-wrap{position:relative;}
.toggle-pass{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:transparent;
  color:#0b5ed7;
  cursor:pointer;
  padding:4px 8px;
  font-size:.85rem;
}
</style>
<script src="sheets-config.js"></script>
</head>
<body>
<div class="container" id="app"></div>

<script>
const RESEARCHER_KEY_STORAGE = "researcherKey";
const RESEARCHER_KEY = "Calmlearn2026";
let researcherKey = sessionStorage.getItem(RESEARCHER_KEY_STORAGE) || "";
let latestRows = [];
let historyRows = [];
let passwordVisible = false;
const SHEETS_URL = (window.CALMLEARN_SHEETS_URL || "").trim();

function isLocalEnvironment() {
  return window.location.protocol === "file:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
}

function getApiMode() {
  return isLocalEnvironment() ? "sheets" : "node";
}

async function readJsonResponse(response, fallbackMessage) {
  const text = await response.text();
  if (!text) return {};
  try {
    return JSON.parse(text);
  } catch {
    const snippet = text.replace(/\s+/g, " ").slice(0, 140);
    throw new Error(fallbackMessage || `Expected JSON but got: ${snippet}`);
  }
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text ?? "";
  return div.innerHTML;
}

function formatTime(seconds) {
  if (seconds === null || seconds === undefined || seconds === "") return "—";
  const n = Number(seconds);
  if (!Number.isFinite(n)) return "—";
  const mins = Math.floor(n / 60);
  const secs = n % 60;
  return `${mins}m ${secs}s`;
}

function scoreText(score, total) {
  if (score === null || total === null || !total) return "—";
  return `${score}/${total}`;
}

function percentFromScore(score, total) {
  if (score === null || total === null || !total) return null;
  return Math.round((score / total) * 100);
}

function renderLogin() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="card login-card">
      <h1>Researcher Access</h1>
      <p class="login-help">Enter the researcher passcode to open the dashboard. This protects participant data from general access.</p>
      <label for="researcherKeyInput" class="note">Researcher passcode</label>
      <div class="password-wrap">
        <input id="researcherKeyInput" class="login-field" type="password" autocomplete="current-password" placeholder="Enter passcode">
        <button type="button" class="toggle-pass" id="togglePassBtn" onclick="togglePassword()">Show</button>
      </div>
      <div class="controls">
        <button type="button" onclick="login()">Access Dashboard</button>
      </div>
      <div id="status"></div>
    </div>
  `;

  const input = document.getElementById("researcherKeyInput");
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });
  input.focus();
}

function togglePassword() {
  const input = document.getElementById("researcherKeyInput");
  const button = document.getElementById("togglePassBtn");
  passwordVisible = !passwordVisible;
  input.type = passwordVisible ? "text" : "password";
  button.textContent = passwordVisible ? "Hide" : "Show";
}

function renderDashboardShell() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <h1>Admin Dashboard - Scores</h1>
      <div class="controls">
        <button onclick="loadLatestData()">Refresh Latest</button>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <div id="status"></div>
      <div class="summary" id="summary"></div>
    </div>

    <div class="card">
      <div class="tab-row">
        <button id="latestTabBtn" class="active" onclick="showTab('latest')">Latest Records</button>
        <button id="historyTabBtn" class="ghost" onclick="showTab('history')">History</button>
      </div>
      <p class="note">Latest records show the current score for each participant. History shows every saved submission event, including older saves for the same participant.</p>

      <div id="latestPanel" class="tab-panel active">
        <div class="filters">
          <input type="text" id="searchInput" class="search-input" placeholder="Search by participant ID..." onkeyup="filterLatestTable()">
          <select id="filterTopic" onchange="filterLatestTable()">
            <option value="">All Topics</option>
          </select>
        </div>
        <div class="table-container">
          <table id="latestTable">
            <thead>
              <tr>
                <th>Participant ID</th>
                <th>Topic</th>
                <th>Textbook Score</th>
                <th>Textbook Time</th>
                <th>Textbook Stress</th>
                <th>CalmLearn Score</th>
                <th>CalmLearn Time</th>
                <th>CalmLearn Stress</th>
                <th>Score Improvement</th>
                <th>Stress Improvement</th>
                <th>Completed</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div id="historyPanel" class="tab-panel">
        <div class="filters">
          <input type="text" id="historySearchInput" class="search-input" placeholder="Search history by participant ID..." onkeyup="filterHistoryTable()">
          <select id="historyFilterTopic" onchange="filterHistoryTable()">
            <option value="">All Topics</option>
          </select>
        </div>
        <div class="table-container">
          <table id="historyTable">
            <thead>
              <tr>
                <th>Saved At</th>
                <th>Participant ID</th>
                <th>Submission ID</th>
                <th>Topic</th>
                <th>Method Order</th>
                <th>Textbook Score</th>
                <th>CalmLearn Score</th>
                <th>Baseline Stress</th>
                <th>Baseline Confidence</th>
                <th>Textbook Stress</th>
                <th>CalmLearn Stress</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function updateStatus(message, type = "info") {
  const el = document.getElementById("status");
  if (!el) return;
  el.textContent = message;
  el.className = `status-${type}`;
}

function showTab(tab) {
  const latestPanel = document.getElementById("latestPanel");
  const historyPanel = document.getElementById("historyPanel");
  const latestBtn = document.getElementById("latestTabBtn");
  const historyBtn = document.getElementById("historyTabBtn");
  const isLatest = tab === "latest";
  latestPanel.classList.toggle("active", isLatest);
  historyPanel.classList.toggle("active", !isLatest);
  latestBtn.classList.toggle("active", isLatest);
  latestBtn.classList.toggle("ghost", !isLatest);
  historyBtn.classList.toggle("active", !isLatest);
  historyBtn.classList.toggle("ghost", isLatest);
  if (!historyRows.length && !isLatest) loadHistoryData();
}

function updateSummary() {
  const scored = latestRows.filter((r) => r.textbook_score !== null || r.calm_score !== null);
  const avgTextbook = scored.some((r) => r.textbook_score !== null)
    ? Math.round(scored.reduce((sum, r) => sum + (percentFromScore(r.textbook_score, r.textbook_quiz_total) || 0), 0) /
      scored.filter((r) => r.textbook_score !== null).length)
    : null;
  const avgCalm = scored.some((r) => r.calm_score !== null)
    ? Math.round(scored.reduce((sum, r) => sum + (percentFromScore(r.calm_score, r.calm_quiz_total) || 0), 0) /
      scored.filter((r) => r.calm_score !== null).length)
    : null;
  document.getElementById("summary").innerHTML = `
    <div class="metric"><div class="label">Latest Participants</div><div class="value">${latestRows.length}</div></div>
    <div class="metric"><div class="label">History Records</div><div class="value">${historyRows.length || "0"}</div></div>
    <div class="metric"><div class="label">Avg Textbook Score</div><div class="value">${avgTextbook === null ? "N/A" : `${avgTextbook}%`}</div></div>
    <div class="metric"><div class="label">Avg CalmLearn Score</div><div class="value">${avgCalm === null ? "N/A" : `${avgCalm}%`}</div></div>
  `;
}

function populateTopicFilters(rows, selectId) {
  const topicSelect = document.getElementById(selectId);
  const currentValue = topicSelect.value;
  const topics = [...new Set(rows.map((r) => r.topic).filter(Boolean))].sort();
  topicSelect.innerHTML = '<option value="">All Topics</option>';
  topics.forEach((topic) => {
    const opt = document.createElement("option");
    opt.value = topic;
    opt.textContent = topic;
    topicSelect.appendChild(opt);
  });
  topicSelect.value = currentValue;
}

function getLatestFilteredRows() {
  const searchVal = document.getElementById("searchInput").value.toLowerCase();
  const topicVal = document.getElementById("filterTopic").value;
  return latestRows.filter((row) => {
    const matchesSearch = !searchVal || String(row.participant_id || "").toLowerCase().includes(searchVal);
    const matchesTopic = !topicVal || row.topic === topicVal;
    return matchesSearch && matchesTopic;
  });
}

function getHistoryFilteredRows() {
  const searchVal = document.getElementById("historySearchInput").value.toLowerCase();
  const topicVal = document.getElementById("historyFilterTopic").value;
  return historyRows.filter((row) => {
    const matchesSearch = !searchVal || String(row.participant_id || "").toLowerCase().includes(searchVal);
    const matchesTopic = !topicVal || row.topic === topicVal;
    return matchesSearch && matchesTopic;
  });
}

function renderLatestTable(rows) {
  const tbody = document.querySelector("#latestTable tbody");
  tbody.innerHTML = "";
  rows.forEach((row) => {
    const textbookPercent = percentFromScore(row.textbook_score, row.textbook_quiz_total);
    const calmPercent = percentFromScore(row.calm_score, row.calm_quiz_total);
    const scoreImprovement = (textbookPercent !== null && calmPercent !== null) ? calmPercent - textbookPercent : null;
    const stressImprovement = (row.baseline_stress !== null && row.calm_post_stress !== null) ? row.baseline_stress - row.calm_post_stress : null;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>${escapeHtml(row.participant_id || "N/A")}</strong></td>
      <td>${escapeHtml(row.topic || "—")}</td>
      <td>${scoreText(row.textbook_score, row.textbook_quiz_total)}</td>
      <td>${formatTime(row.textbook_quiz_time)}</td>
      <td>${row.textbook_post_stress ?? "—"}</td>
      <td>${scoreText(row.calm_score, row.calm_quiz_total)}</td>
      <td>${formatTime(row.calm_quiz_time)}</td>
      <td>${row.calm_post_stress ?? "—"}</td>
      <td>${scoreImprovement === null ? "—" : `<span class="${scoreImprovement > 0 ? "score-high" : scoreImprovement < 0 ? "score-low" : "score-med"}">${scoreImprovement > 0 ? "+" : ""}${scoreImprovement}%</span>`}</td>
      <td>${stressImprovement === null ? "—" : `<span class="${stressImprovement > 0 ? "score-high" : stressImprovement < 0 ? "score-low" : "score-med"}">${stressImprovement > 0 ? "+" : ""}${stressImprovement}</span>`}</td>
      <td>${row.created_at ? new Date(row.created_at).toLocaleString() : "—"}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderHistoryTable(rows) {
  const tbody = document.querySelector("#historyTable tbody");
  tbody.innerHTML = "";
  rows.forEach((row) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.saved_at ? new Date(row.saved_at).toLocaleString() : "—"}</td>
      <td><strong>${escapeHtml(row.participant_id || "N/A")}</strong></td>
      <td>${row.submission_id ?? "—"}</td>
      <td>${escapeHtml(row.topic || "—")}</td>
      <td>${escapeHtml(JSON.stringify(row.method_order || []))}</td>
      <td>${scoreText(row.textbook_score, row.textbook_quiz_total)}</td>
      <td>${scoreText(row.calm_score, row.calm_quiz_total)}</td>
      <td>${row.baseline_stress ?? "—"}</td>
      <td>${row.baseline_confidence ?? "—"}</td>
      <td>${row.textbook_post_stress ?? "—"}</td>
      <td>${row.calm_post_stress ?? "—"}</td>
    `;
    tbody.appendChild(tr);
  });
}

function filterLatestTable() {
  renderLatestTable(getLatestFilteredRows());
}

function filterHistoryTable() {
  renderHistoryTable(getHistoryFilteredRows());
}

async function fetchJSON(url) {
  if (getApiMode() === "sheets") {
    if (!SHEETS_URL) {
      throw new Error("Google Sheets backend is not configured. Set CALMLEARN_SHEETS_URL in sheets-config.js.");
    }
    const response = await fetch(`${SHEETS_URL}?action=list&key=${encodeURIComponent(researcherKey)}`);
    const data = await readJsonResponse(response, "Sheets returned HTML instead of JSON. Redeploy the Apps Script web app.");
    if (!response.ok) {
      throw new Error(data.error || `Sheets request failed (${response.status})`);
    }
    if (Array.isArray(data.rows)) {
      data.rows = data.rows.filter((row) => row && row.participant_id);
    }
    return data;
  }

  const response = await fetch(url);
  const data = await readJsonResponse(response, "Server returned HTML instead of JSON. Start the API or use the Sheets backend.");
  if (!response.ok) {
    throw new Error(data.error || `Request failed (${response.status})`);
  }
  return data;
}

async function login() {
  const status = document.getElementById("status");
  const input = document.getElementById("researcherKeyInput");
  const key = (input.value || "").trim();
  if (!key) {
    status.textContent = "Enter the researcher passcode.";
    status.className = "status-error";
    return;
  }

  try {
    if (key !== RESEARCHER_KEY) {
      throw new Error("Passcode is incorrect.");
    }
    status.textContent = "Opening dashboard...";
    status.className = "status-loading";
    sessionStorage.setItem(RESEARCHER_KEY_STORAGE, key);
    researcherKey = key;
    renderDashboardShell();
    await loadLatestData();
  } catch (err) {
    status.textContent = err.message;
    status.className = "status-error";
  }
}

async function loadLatestData() {
  try {
    updateStatus("Loading latest data...", "loading");
    const result = await fetchJSON("/api/submissions");
    latestRows = Array.isArray(result.rows) ? result.rows : [];
    if (!latestRows.length) {
      const backup = localStorage.getItem("calmlearnLastSavedSubmission");
      if (backup) {
        try {
          latestRows = [JSON.parse(backup)];
          updateStatus("Loaded local backup for this browser session.", "success");
        } catch {
          // ignore malformed local backup
        }
      }
    }
    populateTopicFilters(latestRows, "filterTopic");
    renderLatestTable(getLatestFilteredRows());
    updateSummary();
    updateStatus(`Loaded ${latestRows.length} latest record(s).`, "success");
  } catch (err) {
    updateStatus(err.message, "error");
  }
}

async function loadHistoryData() {
  try {
    updateStatus("Loading history...", "loading");
    const result = await fetchJSON("/api/submissions-history");
    historyRows = Array.isArray(result.rows) ? result.rows : [];
    if (!historyRows.length) {
      const backup = localStorage.getItem("calmlearnLastSavedSubmission");
      if (backup) {
        try {
          const parsed = JSON.parse(backup);
          historyRows = [{ ...parsed, saved_at: new Date().toISOString(), submission_id: "local-backup" }];
        } catch {
          // ignore malformed local backup
        }
      }
    }
    populateTopicFilters(historyRows, "historyFilterTopic");
    renderHistoryTable(getHistoryFilteredRows());
    updateSummary();
    updateStatus(`Loaded ${historyRows.length} history record(s).`, "success");
  } catch (err) {
    updateStatus(err.message, "error");
  }
}

function logout() {
  sessionStorage.removeItem(RESEARCHER_KEY_STORAGE);
  researcherKey = "";
  renderLogin();
}

if (researcherKey) {
  renderDashboardShell();
  loadLatestData();
} else {
  renderLogin();
}
</script>
</body>
</html>
