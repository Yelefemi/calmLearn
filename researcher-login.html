<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Researcher Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Poppins,sans-serif;}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eaf6ff,#f7fbff);padding:20px;color:#234;}
.card{width:min(460px,100%);background:#fff;border-radius:14px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
h1{margin-top:0;color:#0b5ed7;font-size:1.4rem;}
label{display:block;margin-bottom:8px;font-weight:600;}
input{width:100%;padding:10px;border:1px solid #c7d8ef;border-radius:10px;margin-bottom:12px;}
button{border:none;border-radius:22px;padding:10px 16px;background:#0b5ed7;color:#fff;cursor:pointer;}
#status{margin-top:10px;font-size:.95rem;min-height:20px;}
.small{font-size:.85rem;color:#567;line-height:1.5;}
.password-wrap{position:relative;}
.toggle-pass{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:transparent;
  color:#0b5ed7;
  cursor:pointer;
  padding:4px 8px;
  font-size:.85rem;
}
</style>
<script src="sheets-config.js"></script>
</head>
<body>
  <div class="card">
    <h1>Researcher Access</h1>
    <p class="small">Enter the private researcher passcode to access the admin dashboard.</p>
    <label for="researcherKey">Passcode</label>
    <div class="password-wrap">
      <input id="researcherKey" type="password" autocomplete="current-password" placeholder="Enter passcode">
      <button type="button" class="toggle-pass" id="togglePassBtn" onclick="togglePassword()">Show</button>
    </div>
    <button type="button" onclick="login()">Access Dashboard</button>
    <div id="status"></div>
  </div>

<script>
const RESEARCHER_KEY_STORAGE = "researcherKey";
const RESEARCHER_KEY = "Calmlearn2026";
let passwordVisible = false;

async function login() {
  const status = document.getElementById("status");
  const input = document.getElementById("researcherKey");
  const key = (input.value || "").trim();

  if (!key) {
    status.textContent = "Enter the researcher passcode.";
    status.style.color = "#c30000";
    return;
  }

  try {
    if (key !== RESEARCHER_KEY) {
      throw new Error("Passcode is incorrect.");
    }
    status.textContent = "Opening dashboard...";
    status.style.color = "#456";
    sessionStorage.setItem(RESEARCHER_KEY_STORAGE, key);
    window.location.href = "dashboard.html";
  } catch (err) {
    status.textContent = err.message;
    status.style.color = "#c30000";
  }
}

function togglePassword() {
  const input = document.getElementById("researcherKey");
  const button = document.getElementById("togglePassBtn");
  passwordVisible = !passwordVisible;
  input.type = passwordVisible ? "text" : "password";
  button.textContent = passwordVisible ? "Hide" : "Show";
}

window.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});
</script>
</body>
</html>
