<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Researcher Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Poppins,sans-serif;}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eaf6ff,#f7fbff);padding:20px;color:#234;}
.card{width:min(460px,100%);background:#fff;border-radius:14px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
h1{margin-top:0;color:#0b5ed7;font-size:1.4rem;}
label{display:block;margin-bottom:8px;font-weight:600;}
input{width:100%;padding:10px;border:1px solid #c7d8ef;border-radius:10px;margin-bottom:12px;}
button{border:none;border-radius:22px;padding:10px 16px;background:#0b5ed7;color:#fff;cursor:pointer;}
#status{margin-top:10px;font-size:.95rem;min-height:20px;}
.small{font-size:.85rem;color:#567;line-height:1.5;}
</style>
</head>
<body>
  <div class="card">
    <h1>Researcher Access</h1>
    <p class="small">Enter the researcher key to view participant records.</p>
    <label for="keyInput">Researcher Key</label>
    <input id="keyInput" type="password" autocomplete="current-password" />
    <button type="button" onclick="login()">Login</button>
    <div id="status"></div>
  </div>

<script>
const RESEARCHER_KEY_STORAGE = "researcherKey";

async function login() {
  const status = document.getElementById("status");
  const key = document.getElementById("keyInput").value.trim();

  if (!key) {
    status.textContent = "Please enter researcher key.";
    status.style.color = "#c30000";
    return;
  }

  status.textContent = "Verifying...";
  status.style.color = "#456";

  try {
    const response = await fetch("/api/researcher/verify", {
      headers: { "x-researcher-key": key }
    });

    if (!response.ok) {
      status.textContent = "Invalid researcher key.";
      status.style.color = "#c30000";
      return;
    }

    sessionStorage.setItem(RESEARCHER_KEY_STORAGE, key);
    window.location.href = "dashboard.html";
  } catch (_err) {
    status.textContent = "Server unavailable. Start backend first.";
    status.style.color = "#c30000";
  }
}

window.addEventListener("keydown", (e) => {
  if (e.key === "Enter") login();
});
</script>
</body>
</html>
