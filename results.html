<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmLearn | Results & Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f7fbff;
      color: #333;
    }

    /* ================= NAVBAR (GLASS) ================= */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(14px);
      background: rgba(255, 255, 255, 0.35);
      border-bottom: 1px solid rgba(255,255,255,0.4);
      z-index: 1000;
    }

    nav .logo {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0b5ed7;
    }

    nav ul {
      display: flex;
      gap: 25px;
      list-style: none;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 0.95rem;
    }

    nav ul li a:hover {
      color: #0b5ed7;
    }

    nav button {
      background: #000;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.85rem;
    }
     /* ================= ACCESSIBILITY PANEL ================= */
    #accessibilityPanel {
      position: fixed;
      top: 80px;
      right: 30px;
      width: 240px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      padding: 20px;
      display: none;
      z-index: 1001;
    }

    #accessibilityPanel h4 {
      margin-bottom: 15px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .toggle-row input {
      transform: scale(1.3);
      cursor: pointer;
    }

    #fontSlider {
      width: 100%;
      cursor: pointer;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 140px 20px 60px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #0b5ed7;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #28a745;
    }

    .card p {
      font-size: 1.05rem;
    }

    .feedback {
      background: #ffffff;
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      line-height: 1.8;
    }

    .feedback h2 {
      color: #0b5ed7;
      margin-bottom: 15px;
    }

    .conclusion {
      margin-top: 40px;
      background: #eaf6ff;
      padding: 30px;
      border-radius: 20px;
    }

    .restart-btn {
      display: block;
      margin: 50px auto 0;
      padding: 16px 45px;
      border-radius: 30px;
      border: none;
      background: #28a745;
      color: #fff;
      font-size: 1.05rem;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">🌿 CalmLearn</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="experiment.html">Experiment</a></li>
    <!-- <li><a href="learn.html">Learn</a></li> -->
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="results.html">Results</a></li>
  </ul>
  <button id="accessBtn">♿ Accessibility</button>
</nav>

<div class="container">

  <h1>Experiment Results</h1>

  <div class="summary">
    <div class="card">
      <h3>Learning Method</h3>
      <p id="method"></p>
    </div>

    <div class="card">
      <h3>Reading Time</h3>
      <p id="readingTime"></p>
    </div>

    <div class="card">
      <h3>Quiz Time</h3>
      <p id="quizTime"></p>
    </div>

    <div class="card">
      <h3>Quiz Score</h3>
      <p id="score"></p>
    </div>
  </div>

  <div class="feedback">
    <h2>Feedback Report</h2>
    <p id="feedbackText"></p>

    <div class="conclusion">
      <strong>Research Insight:</strong>
      <p id="conclusionText"></p>
    </div>
  </div>

  <button class="restart-btn" onclick="restartExperiment()">Run Experiment Again</button>

</div>

<script>
  const method = localStorage.getItem("learningMethod");
  const quizScore = Number(localStorage.getItem("quizScore"));
  const quizTotal = Number(localStorage.getItem("quizTotal"));
  const quizTime = Number(localStorage.getItem("quizTime"));

  const readingTime = method === "textbook"
    ? Number(localStorage.getItem("readingTimeTextbook"))
    : Number(localStorage.getItem("readingTimeCalmLearn"));

  document.getElementById("method").textContent =
    method === "textbook" ? "📘 Textbook Method" : "🌿 CalmLearn Method";

  document.getElementById("readingTime").textContent =
    `${Math.floor(readingTime / 60)}m ${readingTime % 60}s`;

  document.getElementById("quizTime").textContent =
    `${Math.floor(quizTime / 60)}m ${quizTime % 60}s`;

  document.getElementById("score").textContent =
    `${quizScore} / ${quizTotal}`;

  let feedback = "";
  let conclusion = "";

  if (method === "textbook") {
    feedback = "The textbook method required continuous reading under time pressure. This may increase cognitive load and stress, especially for slow learners or students with learning difficulties.";
    conclusion = "This result suggests that traditional textbook-based learning may negatively affect comprehension speed and performance under pressure.";
  } else {
    feedback = "The CalmLearn method allowed the learner to control the pace, use visuals, and access hints. This reduced pressure and supported better understanding.";
    conclusion = "This result supports the hypothesis that calm, adaptive learning environments can improve comprehension and reduce academic stress.";
  }

  document.getElementById("feedbackText").textContent = feedback;
  document.getElementById("conclusionText").textContent = conclusion;

  function restartExperiment() {
    localStorage.clear();
    window.location.href = "experiment.html";
  }
</script>

</body>
</html>
