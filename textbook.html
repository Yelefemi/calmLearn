<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Textbook Method | CalmLearn Study</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --base-font-size: 16px; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html { font-size: var(--base-font-size); }
    body { background: #ffffff; color: #111; line-height: 1.8; }
    nav {
      position: fixed; top: 0; width: 100%; padding: 15px 24px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(14px); background: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.4); z-index: 1000;
    }
    nav .logo { font-size: 1.2rem; font-weight: 600; color: #0b5ed7; }
    nav .pill { background: #0b5ed7; color: #fff; border-radius: 20px; padding: 8px 12px; font-size: 0.8rem; }
    .container { max-width: 920px; margin: auto; padding: 110px 20px 60px; }
    .warning { background: #ffe6e6; border-left: 5px solid #d00000; padding: 16px; margin-bottom: 22px; font-size: 0.95rem; }
    .meta { background: #f1f8ff; border-left: 4px solid #0b5ed7; padding: 14px; margin-bottom: 18px; }
    h1 { margin-bottom: 14px; color: #000; }
    p { font-size: 1rem; margin-bottom: 20px; }
    .next-btn {
      display: block; margin: 40px auto 0; padding: 14px 30px; border: none;
      background: #0b5ed7; color: #fff; font-size: 1rem; border-radius: 8px; cursor: pointer;
    }
    .refs { margin-top: 28px; padding: 16px; border: 1px solid #d9e9ff; border-radius: 10px; background: #fbfdff; }
    .refs h3 { color: #0b5ed7; margin-bottom: 8px; }
    .refs p { margin-bottom: 8px; font-size: 0.95rem; }
    .audio-btn {
      border: none;
      border-radius: 18px;
      padding: 8px 14px;
      cursor: pointer;
      background: #28a745;
      color: #fff;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<nav>
  <div class="logo">CalmLearn | Textbook Track</div>
  <div class="pill" id="roundPill">Round 1 of 2</div>
</nav>

<div class="container">
  <div class="meta" id="methodOrderInfo"></div>
  <div class="warning">
    <strong>Instruction:</strong> Read the full passage carefully. This same content is presented in the CalmLearn track with image support.
  </div>

  <h1 id="topicTitle">Topic</h1>
  <p id="topicIntro"></p>
  <p id="p1"></p>
  <p id="p2"></p>
  <p id="p3"></p>
  <p id="p4"></p>

  <button class="next-btn" onclick="goToQuiz()">Proceed To Quiz</button>

  <div class="refs">
    <h3>References</h3>
    <div id="refsList"></div>
  </div>
</div>

<script src="curriculum.js"></script>
<script src="audio-reader.js"></script>
<script>
  const order = JSON.parse(localStorage.getItem("methodOrder") || "[]");
  const idx = Number(localStorage.getItem("currentMethodIndex") || "0");
  const round = idx + 1;
  document.getElementById("roundPill").textContent = `Round ${round} of ${order.length || 2}`;
  document.getElementById("methodOrderInfo").textContent =
    `Assigned order: ${(order[0] || "textbook")} -> ${(order[1] || "calmlearn")}.`;
  const selection = window.CalmLearnCurriculum.getActiveSelection();
  const topic = selection.topic;
  if (topic) {
    document.getElementById("topicTitle").textContent = topic.textbookTitle;
    document.getElementById("topicIntro").textContent = topic.textbookIntro;
    document.getElementById("p1").textContent = topic.textbookParagraphs[0] || "";
    document.getElementById("p2").textContent = topic.textbookParagraphs[1] || "";
    document.getElementById("p3").textContent = topic.textbookParagraphs[2] || "";
    document.getElementById("p4").textContent = topic.textbookParagraphs[3] || "";
    document.getElementById("refsList").innerHTML = (topic.references || [])
      .map((reference) => `<p>${reference}</p>`)
      .join("");
  }
  window.CalmLearnAudioReader.mountControls(["#topicTitle", "#topicIntro", "#p1", "#p2", "#p3", "#p4"], ".meta");

  const readingStart = Date.now();

  function goToQuiz() {
    const readingTime = Math.floor((Date.now() - readingStart) / 1000);
    localStorage.setItem("textbookReadingTime", String(readingTime));
    localStorage.setItem("currentMethod", "textbook");
    window.location.href = "quiz.html";
  }
</script>
</body>
</html>
