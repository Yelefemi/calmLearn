<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmLearn | Calm Reset</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#eaf6ff,#f7fbff);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
nav{position:fixed;top:0;width:100%;padding:15px 24px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(14px);background:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.4);z-index:1000;}
nav .logo{font-size:1.2rem;font-weight:600;color:#0b5ed7;}
nav .pill{background:#28a745;color:#fff;border-radius:20px;padding:8px 12px;font-size:0.8rem;}
h1{color:#0b5ed7;margin-bottom:10px;}
p{color:#333;margin-bottom:18px;}
.scale{margin:10px 0 25px;}
.scale button{margin:5px;padding:10px 15px;border-radius:50%;border:none;background:#0b5ed7;color:#fff;cursor:pointer;}
.scale button.selected{background:#28a745;}
.breath-container{position:relative;width:210px;height:210px;margin-bottom:18px;display:none;}
.circle{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,#28a745,#0b5ed7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;animation:breath 12s ease-in-out infinite;}
@keyframes breath{0%{transform:scale(1);}25%{transform:scale(1.35);}50%{transform:scale(1.35);}75%{transform:scale(1);}100%{transform:scale(1);}}
#cycleText{font-size:0.95rem;color:#28a745;margin-bottom:15px;min-height:24px;}
button.main{padding:14px 30px;border:none;border-radius:30px;background:#28a745;color:#fff;font-size:1rem;cursor:pointer;opacity:0.5;pointer-events:none;}
button.main.enabled{opacity:1;pointer-events:auto;}
</style>
</head>
<body>
<nav>
  <div class="logo">CalmLearn | Calm Track</div>
  <div class="pill" id="roundPill">Round 1 of 2</div>
</nav>

<h1>Calm Reset Before Learning</h1>
<p>Rate your stress now, complete 3 slow breathing cycles, then continue.</p>

<div class="scale" id="preScale">
  <button onclick="selectPre(1)" type="button">1</button>
  <button onclick="selectPre(2)" type="button">2</button>
  <button onclick="selectPre(3)" type="button">3</button>
  <button onclick="selectPre(4)" type="button">4</button>
  <button onclick="selectPre(5)" type="button">5</button>
</div>

<p id="instruction" style="display:none;">Follow the circle rhythm.</p>
<div class="breath-container" id="waveBox">
  <div class="circle"><div id="breathText"></div></div>
</div>
<div id="cycleText"></div>

<div id="postSection" style="display:none;">
  <p>After breathing, how stressed do you feel?</p>
  <div class="scale" id="postScale">
    <button onclick="selectPost(1)" type="button">1</button>
    <button onclick="selectPost(2)" type="button">2</button>
    <button onclick="selectPost(3)" type="button">3</button>
    <button onclick="selectPost(4)" type="button">4</button>
    <button onclick="selectPost(5)" type="button">5</button>
  </div>
</div>

<button class="main" id="continueBtn" type="button">Continue To CalmLearn Content</button>

<script>
const order = JSON.parse(localStorage.getItem("methodOrder") || "[]");
const idx = Number(localStorage.getItem("currentMethodIndex") || "0");
const round = idx + 1;
document.getElementById("roundPill").textContent = `Round ${round} of ${order.length || 2}`;

let preStress = null;
let postStress = null;
let cycles = 0;
let phase = 0;
const phases = ["Breathe In", "Hold", "Breathe Out"];
const breathText = document.getElementById("breathText");
const cycleText = document.getElementById("cycleText");
const continueBtn = document.getElementById("continueBtn");

function selectPre(value){
  preStress = value;
  localStorage.setItem("calmBreathingPreStress", String(value));
  const buttons = document.querySelectorAll("#preScale button");
  buttons.forEach(btn => btn.classList.remove("selected"));
  buttons[value - 1].classList.add("selected");

  document.getElementById("preScale").style.display = "none";
  document.getElementById("instruction").style.display = "block";
  document.getElementById("waveBox").style.display = "block";
  startBreathing();
}

function startBreathing(){
  function breathingCycle(){
    breathText.textContent = phases[phase];
    phase++;

    if(phase === phases.length){
      phase = 0;
      cycles++;
      cycleText.textContent = `Cycle ${cycles} of 3`;
    }

    if(cycles >= 3){
      breathText.textContent = "Ready";
      document.getElementById("postSection").style.display = "block";
      return;
    }

    setTimeout(breathingCycle, 4000);
  }

  breathingCycle();
}

function selectPost(value){
  postStress = value;
  localStorage.setItem("calmBreathingPostStress", String(value));
  const buttons = document.querySelectorAll("#postScale button");
  buttons.forEach(btn => btn.classList.remove("selected"));
  buttons[value - 1].classList.add("selected");
  continueBtn.classList.add("enabled");
}

continueBtn.onclick = function(){
  if (!continueBtn.classList.contains("enabled")) return;
  localStorage.setItem("currentMethod", "calmlearn");
  window.location.href = "learn.html";
};
</script>
</body>
</html>
