<!DOCTYPE html>
<html>
<head>
<title>CalmLearn | Pre-Test Assessment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#eaf6ff,#f7fbff);
  text-align:center;
  padding:40px;
}

/* ================= NAVBAR (GLASS) ================= */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(14px);
  background: rgba(255, 255, 255, 0.35);
  border-bottom: 1px solid rgba(255,255,255,0.4);
  z-index: 1000;
}

nav .logo {
  font-size: 1.4rem;
  font-weight: 600;
  color: #0b5ed7;
}

nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
  align-items: center;
}

nav ul li a {
  text-decoration: none;
  color: #333;
  font-size: 0.95rem;
}

nav ul li a:hover {
  color: #0b5ed7;
}

nav button {
  background: #000;
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 0.85rem;
}

/* ================= ACCESSIBILITY PANEL ================= */
#accessibilityPanel {
  position: fixed;
  top: 80px;
  right: 30px;
  width: 240px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  padding: 20px;
  display: none;
  z-index: 1001;
}

#accessibilityPanel h4 {
  margin-bottom: 15px;
}

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.toggle-row input {
  transform: scale(1.3);
  cursor: pointer;
}

#fontSlider {
  width: 100%;
  cursor: pointer;
}

h1{
  color:#0b5ed7;
  margin-bottom:10px;
}

p{
  margin-bottom:20px;
  color:#333;
}

.section{
  margin:25px 0;
}

.scale button{
  margin:5px;
  padding:12px 18px;
  border-radius:50%;
  border:none;
  background:#0b5ed7;
  color:#fff;
  cursor:pointer;
}

.scale button.selected{
  background:#28a745;
}

select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  width:250px;
}

.start-btn{
  margin-top:30px;
  padding:15px 40px;
  border:none;
  border-radius:30px;
  background:#28a745;
  color:#fff;
  font-size:1rem;
  cursor:pointer;
  opacity:0.5;
  pointer-events:none;
}
.start-btn.enabled{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">🌿 CalmLearn</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="experiment.html">Experiment</a></li>
    <!-- <li><a href="learn.html">Learn</a></li> -->
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="results.html">Results</a></li>
  </ul>
  <button id="accessBtn">♿ Accessibility</button>
</nav>

<!-- ACCESSIBILITY PANEL -->
<div id="accessibilityPanel">
  <h4>Accessibility</h4>

  <div class="toggle-row">
    <label for="accessToggle">Enable</label>
    <input type="checkbox" id="accessToggle">
  </div>

  <label for="fontSlider">Text Size</label>
  <input type="range" id="fontSlider" min="14" max="22" value="16">
</div>

<h1>📊 Pre-Learning Assessment</h1>
<p>Please answer honestly before we begin.</p>

<div class="section">
  <h3>How stressed do you feel right now?</h3>
  <div class="scale" id="stressScale">
    <button onclick="selectValue('stress',1)">1</button>
    <button onclick="selectValue('stress',2)">2</button>
    <button onclick="selectValue('stress',3)">3</button>
    <button onclick="selectValue('stress',4)">4</button>
    <button onclick="selectValue('stress',5)">5</button>
  </div>
</div>

<div class="section">
  <h3>How confident are you about this topic?</h3>
  <div class="scale" id="confidenceScale">
    <button onclick="selectValue('confidence',1)">1</button>
    <button onclick="selectValue('confidence',2)">2</button>
    <button onclick="selectValue('confidence',3)">3</button>
    <button onclick="selectValue('confidence',4)">4</button>
    <button onclick="selectValue('confidence',5)">5</button>
  </div>
</div>

<div class="section">
  <h3>How comfortable are you reading long texts?</h3>
  <div class="scale" id="readingScale">
    <button onclick="selectValue('reading',1)">1</button>
    <button onclick="selectValue('reading',2)">2</button>
    <button onclick="selectValue('reading',3)">3</button>
    <button onclick="selectValue('reading',4)">4</button>
    <button onclick="selectValue('reading',5)">5</button>
  </div>
</div>

<div class="section">
  <h3>Select Learning Method</h3>
  <select id="methodSelect">
    <option value="">Choose Method</option>
    <option value="textbook">Textbook Method</option>
    <option value="calm">CalmLearn Method</option>
  </select>
</div>

<button class="start-btn" id="startBtn">Start Learning</button>

<script>

const accessBtn = document.getElementById("accessBtn");
const panel = document.getElementById("accessibilityPanel");
const toggle = document.getElementById("accessToggle");
const slider = document.getElementById("fontSlider");

accessBtn.onclick = () => {
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

toggle.onchange = () => {
  document.body.classList.toggle("accessible", toggle.checked);
  localStorage.setItem("accessible", toggle.checked);
};

slider.oninput = () => {
  document.documentElement.style.setProperty(
    "--base-font-size",
    slider.value + "px"
  );
  localStorage.setItem("fontSize", slider.value);
};

window.onload = () => {
  if (localStorage.getItem("accessible") === "true") {
    document.body.classList.add("accessible");
    toggle.checked = true;
  }
  const savedFont = localStorage.getItem("fontSize");
  if (savedFont) {
    document.documentElement.style.setProperty("--base-font-size", savedFont + "px");
    slider.value = savedFont;
  }
};

let responses = {
  stress:null,
  confidence:null,
  reading:null
};

function selectValue(type, value){
  responses[type] = value;

  const scale = document.getElementById(type+"Scale");
  const buttons = scale.getElementsByTagName("button");

  for(let btn of buttons){
    btn.classList.remove("selected");
  }

  buttons[value-1].classList.add("selected");

  checkReady();
}

document.getElementById("methodSelect").addEventListener("change", checkReady);

function checkReady(){
  if(
    responses.stress &&
    responses.confidence &&
    responses.reading &&
    document.getElementById("methodSelect").value !== ""
  ){
    document.getElementById("startBtn").classList.add("enabled");
  }
}

document.getElementById("startBtn").onclick = function(){

  localStorage.setItem("baselineStress", responses.stress);
  localStorage.setItem("baselineConfidence", responses.confidence);
  localStorage.setItem("baselineReadingComfort", responses.reading);

  let method = document.getElementById("methodSelect").value;

  if(method === "textbook"){
    localStorage.setItem("textbookPreStress", responses.stress);
    window.location.href = "textbook.html";
  }
  else{
    localStorage.setItem("preStress", responses.stress);
    window.location.href = "calm.html";
  }
};

</script>

</body>
</html>
