<!DOCTYPE html>
<html>
<head>
<title>CalmLearn | Stress Comparison</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#eaf6ff,#f7fbff);
  text-align:center;
  padding:40px;
}

/* ================= NAVBAR (GLASS) ================= */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(14px);
  background: rgba(255, 255, 255, 0.35);
  border-bottom: 1px solid rgba(255,255,255,0.4);
  z-index: 1000;
}

nav .logo {
  font-size: 1.4rem;
  font-weight: 600;
  color: #0b5ed7;
}

nav ul {
  display: flex;
  gap: 25px;
  list-style: none;
  align-items: center;
}

nav ul li a {
  text-decoration: none;
  color: #333;
  font-size: 0.95rem;
}

nav ul li a:hover {
  color: #0b5ed7;
}

nav button {
  background: #000;
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 0.85rem;
}

/* ================= ACCESSIBILITY PANEL ================= */
#accessibilityPanel {
  position: fixed;
  top: 80px;
  right: 30px;
  width: 240px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  padding: 20px;
  display: none;
  z-index: 1001;
}

#accessibilityPanel h4 {
  margin-bottom: 15px;
}

.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.toggle-row input {
  transform: scale(1.3);
  cursor: pointer;
}

#fontSlider {
  width: 100%;
  cursor: pointer;
}

h1{
  color:#0b5ed7;
}

.chart{
  margin:40px auto;
  width:300px;
}

.bar{
  height:40px;
  margin:20px 0;
  border-radius:20px;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.textbook{
  background:#dc3545;
}

.calm{
  background:#28a745;
}

.result{
  margin-top:30px;
  font-size:1.1rem;
  font-weight:600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">🌿 CalmLearn</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="experiment.html">Experiment</a></li>
    <!-- <li><a href="learn.html">Learn</a></li> -->
    <li><a href="quiz.html">Quiz</a></li>
    <li><a href="results.html">Results</a></li>
  </ul>
  <button id="accessBtn">♿ Accessibility</button>
</nav>

<!-- ACCESSIBILITY PANEL -->
<div id="accessibilityPanel">
  <h4>Accessibility</h4>

  <div class="toggle-row">
    <label for="accessToggle">Enable</label>
    <input type="checkbox" id="accessToggle">
  </div>

  <label for="fontSlider">Text Size</label>
  <input type="range" id="fontSlider" min="14" max="22" value="16">
</div>

<h1>📊 Stress Reduction Comparison</h1>

<div class="chart">
  <div id="textbookBar" class="bar textbook"></div>
  <div id="calmBar" class="bar calm"></div>
</div>

<div class="result" id="finalResult"></div>

<script>

const accessBtn = document.getElementById("accessBtn");
const panel = document.getElementById("accessibilityPanel");
const toggle = document.getElementById("accessToggle");
const slider = document.getElementById("fontSlider");

accessBtn.onclick = () => {
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

toggle.onchange = () => {
  document.body.classList.toggle("accessible", toggle.checked);
  localStorage.setItem("accessible", toggle.checked);
};

slider.oninput = () => {
  document.documentElement.style.setProperty(
    "--base-font-size",
    slider.value + "px"
  );
  localStorage.setItem("fontSize", slider.value);
};

window.onload = () => {
  if (localStorage.getItem("accessible") === "true") {
    document.body.classList.add("accessible");
    toggle.checked = true;
  }
  const savedFont = localStorage.getItem("fontSize");
  if (savedFont) {
    document.documentElement.style.setProperty("--base-font-size", savedFont + "px");
    slider.value = savedFont;
  }
};

let textbookPre = parseInt(localStorage.getItem("textbookPreStress"));
let textbookPost = parseInt(localStorage.getItem("textbookPostStress"));

let calmPre = parseInt(localStorage.getItem("preStress"));
let calmPost = parseInt(localStorage.getItem("postStress"));

let textbookChange = textbookPre - textbookPost;
let calmChange = calmPre - calmPost;

if(isNaN(textbookChange)) textbookChange = 0;
if(isNaN(calmChange)) calmChange = 0;

document.getElementById("textbookBar").style.width = (textbookChange*40) + "px";
document.getElementById("calmBar").style.width = (calmChange*40) + "px";

document.getElementById("textbookBar").innerText =
  "Textbook: " + textbookChange + " level reduction";

document.getElementById("calmBar").innerText =
  "CalmLearn: " + calmChange + " level reduction";

let resultText;

if(calmChange > textbookChange){
  resultText = "CalmLearn reduced stress more effectively 🌿";
}
else if(calmChange < textbookChange){
  resultText = "Textbook method showed greater reduction.";
}
else{
  resultText = "Both methods showed equal stress change.";
}

document.getElementById("finalResult").innerText = resultText;

</script>

</body>
</html>
