<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmLearn | Experiment Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; font-family: Poppins, sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg,#e6f7ff,#ffffff); color: #223; }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
    h1 { color: #0b5ed7; }
    .card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); margin-top: 16px; }
    ul { line-height: 1.8; }
    button { margin-top: 18px; border: none; border-radius: 24px; padding: 12px 20px; background: #28a745; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Experiment Instructions</h1>
    <div class="card">
      <ul>
        <li>Participants complete the baseline assessment first.</li>
        <li>Both methods are completed in randomized order.</li>
        <li>Each method is followed by a reworded quiz and post-quiz check-in.</li>
        <li>Results are kept for researcher analysis and not shown to participants.</li>
      </ul>
      <button onclick="window.location.href='pretest.html'">Go To Baseline Assessment</button>
    </div>
  </div>
</body>
</html>
